syntax = "proto3";

package alertum.logs.v1;

option java_multiple_files = true;
option java_package = "io.alertum.logs.v1";
option java_outer_classname = "LogsIngestionProto";

service LogsIngestionService {
  rpc SendLogs (LogBatchRequest) returns (LogBatchResponse);
}

message LogBatchRequest {
  string sdk_version = 1;
  string source = 2;
  repeated LogEntry logs = 3;
}

message LogEntry {
  string log_id = 1;
  int64 timestamp_unix_ms = 2;
  string level = 3;
  string message = 4;
  string service = 5;
  string environment = 6;
  string team_id = 7;
  string endpoint = 8;
  int32 status_code = 9;
  int64 duration_ms = 10;
  bool error = 11;
  string trace_id = 12;
  string span_id = 13;
  map<string, string> metadata = 14;
  repeated string tags = 15;
}

message LogBatchResponse {
  int32 accepted = 1;
  int32 dropped = 2;
  repeated DropReason drop_reasons = 3;
}

message DropReason {
  string log_id = 1;
  string reason = 2;
}
